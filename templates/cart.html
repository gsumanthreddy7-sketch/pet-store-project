<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart – PetStore Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.cart-box {
  margin: 30px auto;
  width: 60%;
}

.item {
  border-bottom: 1px solid #444;
  padding: 10px;
}

button {
  padding: 10px 20px;
  margin-top: 15px;
  cursor: pointer;
}

#paymentBox {
  display: none;
  background: white;
  color: black;
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Your Cart 🛒</h1>

<div class="cart-box" id="cart-items"></div>

<h2>Total: ₹<span id="total">0</span></h2>

<button onclick="showPayment()">Proceed to Pay</button>

<!-- QR PAYMENT -->
<div id="paymentBox">
  <h2>Scan & Pay</h2>

  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=sumanth@upi&pn=Sumanth&am=0" id="qr">

  <p><b>Name:</b> Sumanth Reddy</p>
  <p><b>UPI:</b> sumanth@upi</p>
  <p><b>Amount:</b> ₹<span id="payAmount"></span></p>

  <button onclick="paid()">I Paid</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart() {
  let container = document.getElementById("cart-items");
  let total = 0;
  container.innerHTML = "";

  cart.forEach((item, index) => {
    total += item.price;

    container.innerHTML += `
      <div class="item">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>
        <button onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function showPayment() {
  let total = document.getElementById("total").innerText;

  document.getElementById("paymentBox").style.display = "block";
  document.getElementById("payAmount").innerText = total;

  // Update QR dynamically
  document.getElementById("qr").src =
    `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=sumanth@upi&pn=Sumanth&am=${total}`;
}

function paid() {
  alert("Payment Successful ✅");
  localStorage.removeItem("cart");
  location.reload();
}

renderCart();
</script>

</body>
</html>
